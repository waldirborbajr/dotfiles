#:schema https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version = 2
final_space = true
console_title_template = '{{ .Shell }} in {{ .Folder }}'

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = false

[[blocks.segments]]
type = 'path'
style = 'plain'
background = 'transparent'
foreground = '#8aadf4'
template = '{{ .Path }}'
[blocks.segments.options]
style = 'full'

# === Language segments (Go / Rust / Python) ===
[[blocks.segments]]
type = 'go'
style = 'plain'
background = 'transparent'
foreground = '#00add8'
template = 'Ņś” {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
[blocks.segments.options]
fetch_version = true
display_mode = 'context'   # shows only in Go projects

[[blocks.segments]]
type = 'rust'
style = 'plain'
background = 'transparent'
foreground = '#dea584'
template = 'Ņ×© {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
[blocks.segments.options]
fetch_version = true
display_mode = 'context'

[[blocks.segments]]
type = 'python'
style = 'plain'
background = 'transparent'
foreground = '#ffd43b'
template = 'ŅłĄ {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }}'
[blocks.segments.options]
fetch_version = true
fetch_virtual_env = true
display_mode = 'context'   # shows version + venv when relevant

# === Docker segment ===
[[blocks.segments]]
type = 'docker'
style = 'plain'
background = 'transparent'
foreground = '#0db7ed'
template = '’īł {{ .Context }}'
[blocks.segments.options]
display_mode = 'context'   # only shows when context != "default"
fetch_context = true

[[blocks.segments]]
type = 'git'
style = 'plain'
foreground = '#6e738d'
background = 'transparent'
template = ' {{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }} <cyan>{{ if gt .Behind 0 }}ŌćŻ{{ end }}{{ if gt .Ahead 0 }}ŌćĪ{{ end }}</>'
[blocks.segments.options]
branch_icon = ''
commit_icon = '@'
fetch_status = true

[[blocks]]
type = 'rprompt'
overflow = 'hidden'

[[blocks.segments]]
type = 'executiontime'
style = 'plain'
foreground = '#eed49f'
background = 'transparent'
template = '{{ .FormattedMs }}'
[blocks.segments.options]
threshold = 5000

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

[[blocks.segments]]
type = 'text'
style = 'plain'
foreground_templates = [
  "{{if gt .Code 0}}#ed8796{{end}}",
  "{{if eq .Code 0}}#c6a0f6{{end}}",
]
background = 'transparent'
template = 'ŌØ»'

[transient_prompt]
foreground_templates = [
  "{{if gt .Code 0}}#ed8796{{end}}",
  "{{if eq .Code 0}}#c6a0f6{{end}}",
]
background = 'transparent'
template = 'ŌØ» '

[secondary_prompt]
foreground = '#c6a0f6'
background = 'transparent'
template = 'ŌØ»ŌØ» '
