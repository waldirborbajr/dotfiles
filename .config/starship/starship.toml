add_newline = false
# A minimal left prompt
format = """$directory$character"""
palette = "catppuccin_mocha"
# move the rest of the prompt to the right
right_format = """$all"""

# [os.symbols]
# Ubuntu = "ubnt "
# Macos = "mac "
# Linux = "lnx "
# Pop = "pop "

# [os]
# format = " on [$name]($style)"
# style = "bold blue"
# disabled = false

# # Change the default prompt characters
# [character]
# success_symbol = "[>](bold green)"
# error_symbol = "[x](bold red)"
# vimcmd_symbol = "[<](bold green)"

[directory]
truncation_length = 3
truncation_symbol = "вҖҰ/"
# home_symbol = "пҹқ ~"
read_only_style = "197"
read_only = " пҖЈ "
format = "[$path]($style)[$read_only]($read_only_style) "

[aws]
format = 'on [$symbol($profile )(\($region\) )]($style)'
style='bold blue'
symbol = "aws "

[golang]
format = "[${symbol} $version](bold blue)"
symbol = "оҳ§"
# symbol = "go "
style='bold blue'

[docker_context]
format = "via [пҢҲ $context](bold blue) "
disabled = false

[python]
format = "[${symbol} $version](white)"
symbol = "оңј "

[rust]
format = "[${symbol} $version](white)"
symbol = "оһЁ"

[kubernetes]
symbol = 'вҳё'
disabled = false
detect_files = ['k8s', 'Dockerfile']
detect_extensions = ['yaml']
format = '[$symbol$context( \($namespace\))]($style) '

[kubernetes.context_aliases]
'arn:aws:eks:us-west-2:123:cluster/gal-kub-demo-cluster' = 'gal'

[git_branch]
symbol = 'оӮ  '
format = "on [$symbol$branch]($style) "
truncation_length = 4
truncation_symbol = "вҖҰ/"
# ignore_branches = ['master', 'main']
style = "bold green"

[git_commit]
commit_hash_length = 4
tag_symbol = 'рҹ”– '

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[рҹҚ’ PICKING](bold red)'

[git_metrics]
added_style = 'bold blue'
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

[git_status]
format = '[\($all_status$ahead_behind\)]($style) '
# format = ''
style = "bold green"
conflicted = "рҹҸі"
up_to_date = "пҒҶ "
untracked = "п”© "
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
stashed = "пЈ– "
modified = "пҒ„ "
staged = '[++\($count\)](green)'
renamed = "пӘ¶ "
deleted = "пҖ” "

