import = ["/home/borba/.config/alacritty/catppuccin/catppuccin-mocha.toml"]
live_config_reload = true

selection.save_to_clipboard = true

[colors]
draw_bold_text_with_bright_colors = true
transparent_background_colors = true

[window]
dynamic_padding = true
opacity = 0.95
# startup_mode = "Maximized"
decorations = "none"

[window.padding]
x = 7
y = 0

[cursor]
unfocused_hollow = true

[cursor.style]
blinking = "Never"

[env]
TERM = "xterm-256color"

[font]
size = 11.0

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.bold_italic]
family = "FiraCode Nerd Font"
style = "Bold Italic"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[[keyboard.bindings]]
action = "Quit"
key = "Q"
mods = "Command|Control"

[[keyboard.bindings]]
action = "Quit"
key = "W"
mods = "Command|Control"

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F11"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "PasteSelection"
key = "Insert"
mods = "Shift"

[[keyboard.bindings]]
action = "ResetFontSize"
key = "Key0"
mods = "Control"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Equals"
mods = "Control"

[[keyboard.bindings]]
action = "Paste"
key = "Paste"

[[keyboard.bindings]]
action = "Copy"
key = "Copy"

[[keyboard.bindings]]
action = "ClearLogNotice"
key = "L"
mods = "Control"

[[keyboard.bindings]]
chars = "\f"
key = "L"
mods = "Control"

[[keyboard.bindings]]
chars = "\u0001c"
key = "T"
mods = "Command|Control"

[[keyboard.bindings]]
chars = "\u0001b"
key = "B"
mods = "Command|Control"

[[keyboard.bindings]]
chars = "\u0001z"
key = "Z"
mods = "Command|Control"

[[keyboard.bindings]]
chars = "\u00010"
key = "S"
mods = "Command|Control"

[[keyboard.bindings]]
chars = "\u0001e"
key = "E"
mods = "Command|Control"

[mouse]
hide_when_typing = true

[scrolling]
history = 2000

[shell]
program = "/usr/bin/zsh"

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
command = "xdg-open"
post_processing = true
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key = "O"
mods = "Control|Shift"

[hints.enabled.mouse]
enabled = true
mods = "None"
