import = ["/home/borba/.config/alacritty/catppuccin/catppuccin-mocha.toml"]
live_config_reload = true

[colors]
draw_bold_text_with_bright_colors = true

[cursor]
unfocused_hollow = true

[cursor.style]
blinking = "Never"

[env]
TERM = "xterm-256color"

[font]
size = 10.5

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.bold_italic]
family = "FiraCode Nerd Font"
style = "Bold Italic"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[[keyboard.bindings]]
action = "CreateNewWindow"
key = "N"
mods = "Command|Control"

[[keyboard.bindings]]
action = "Quit"
key = "Q"
mods = "Command|Control"

[[keyboard.bindings]]
action = "Quit"
key = "W"
mods = "Command|Control"

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F11"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "PasteSelection"
key = "Insert"
mods = "Shift"

[[keyboard.bindings]]
action = "ResetFontSize"
key = "Key0"
mods = "Control"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Equals"
mods = "Control"

[[keyboard.bindings]]
action = "Paste"
key = "Paste"

[[keyboard.bindings]]
action = "Copy"
key = "Copy"

[[keyboard.bindings]]
action = "ClearLogNotice"
key = "L"
mods = "Control"

[[keyboard.bindings]]
chars = "\f"
key = "L"
mods = "Control"

[[keyboard.bindings]]
chars = "\u0001c"
key = "T"
mods = "Command|Control"

[[keyboard.bindings]]
chars = "\u0001b"
key = "B"
mods = "Command|Control"

[[keyboard.bindings]]
chars = "\u0001z"
key = "Z"
mods = "Command|Control"

[[keyboard.bindings]]
chars = "\u00010"
key = "S"
mods = "Command|Control"

[[keyboard.bindings]]
chars = "\u0001e"
key = "E"
mods = "Command|Control"

[mouse]
hide_when_typing = true

# regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-<>\"\\s{-}\\^⟨⟩`]+"# [[mouse.enabled]]
# command = "xdg-open"
# hyperlinks = true
# post_processing = true
#
# [mouse.enabled.binding]
# key = "U"
# mods = "Control|Shift"
#
# [mouse.enabled.mouse]
# mods = "None"

[scrolling]
history = 2000

[selection]
save_to_clipboard = true

[shell]
program = "/usr/bin/zsh"

[window]
dynamic_padding = false
dynamic_title = true
opacity = 0.9
startup_mode = "Maximized"
title = "Terminal"
