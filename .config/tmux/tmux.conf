#    ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚ēö‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ
#    ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēó
#    ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚ēö‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚ēó
#    ‚ēö‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ
# Terminal multiplexer
# https://github.com/tmux/tmux

# reset tmux keybindings
source-file ~/.config/tmux/tmux.reset.conf

prompt='ůĪĚĀ ÓćČ'

# enable true color mode (on mac and linux)
# see https://github.com/tmux/tmux/issues/2665#issuecomment-825017707
# on mac, the terminfo must be updated as per https://gist.github.com/bbqtd/a4ac060d6f6b9ea6fe3aabe735aa9d95
  set-option -gs default-terminal "tmux-256color"
  set -g terminal-overrides ",xterm-256color:RGB"
  # set -g allow-passthrough on
  set -ga update-environment TERM
  set -ga update-environment TERM_PROGRAM
  set -ga update-environment FZF_DEFAULT_OPTS

  # set -g cursor-style blinking-bar
  # set-option -gas terminal-overrides "*:Tc" # true color support
  # set-option -gas terminal-overrides "*:RGB" # true color support

  set -g default-terminal "${TERM}"

  set -ga terminal-overrides ",*256col*:Tc"

# additional support for alacritty
  set -as terminal-features ",alacritty*:RGB"

# act like vim
  setw -g mode-keys vi

# enable focus events
  set -g focus-events on

  set -g set-clipboard on      # use system clipboard

# we lost the default binding of C-l for clearing screen
# this line of code fixes it by allowing us to use prefix + C-l
  bind C-l send-keys 'C-l'

# setup leader key
  unbind C-b
  set -g prefix C-a

# shortcuts for iterating on tmux config
  bind-key r source-file ~/.config/tmux/tmux.conf \; display-message '~/.tmux.conf reloaded ūüöÄ'
  bind-key M split -h 'vim ~/.config/tmux/tmux.conf'

# ==============================================================
# Appearance
# ==============================================================

# start index from 1
# Start windows and panes at 1, not 0
  set -g base-index 1
  set -g pane-base-index 1
  set-window-option -g pane-base-index 1
  set-option -g renumber-windows On

  set -g mode-style "fg=#7aa2f7,bg=#3b4261"

  set -g message-style "fg=#7aa2f7,bg=default"
  set -g message-command-style "fg=#7aa2f7,bg=default"

  set -g pane-border-style "fg=#3b4261"
  set -g pane-active-border-style "fg=#3b4261"

# top border style
  set -g pane-border-format ""
  setw -g pane-border-status top

# formatting and configuration for status text
  set -g status-style "fg=#7aa2f7,bg=default"
  setw -g window-status-activity-style "underscore,fg=#a9b1d6,bg=default"
  setw -g window-status-separator ""
  setw -g window-status-style "NONE,fg=#a9b1d6,bg=default"
  set -g status-right "#{prefix_highlight} #{battery_icon_charge} #{battery_percentage} #[fg=#3b4261,bg=default,nobold,nounderscore,noitalics]Óāĺ#[fg=#7aa2f7,bg=#3b4261] %I:%M %p #[fg=#7aa2f7,bg=#3b4261,nobold,nounderscore,noitalics]Óāĺ#[fg=#1D202F,bg=#7aa2f7,bold] #{online_status} #{tmux_mode_indicator}"
  set -g status-left "#[fg=#1D202F,bg=#7aa2f7,bold] #S #[bg=default,fg=#7aa2f7,bold]Óāł#[bg=default]"
  set -g status-left-length 150
  set -g status-right-length 150
  set -g status-interval 5
  set -g status-justify left
  set -g status-position top

# window title
# tmux tab (window name) styling
  set -g window-status-format "#[fg=#2a2e40]Óāĺ#[bg=#2a2e40,fg=#565d83] #I ÓāŅ #W #[fg=#2a2e40,bg=default]Óāł"
  set -g window-status-current-format "#[fg=#ffffff]Óāĺ#[fg=#1d202f,bg=#ffffff] #I ÓāŅ #W #[fg=#ffffff,bg=default]Óāł"
# prevent auto window renaming once I renamed it
  set -g allow-rename off

# ==============================================================
# Pane Stuff
# ==============================================================

# splitting and creating new windows
  bind c new-window -c "#{pane_current_path}"
  bind h split-window -h -c "#{pane_current_path}"
  bind v split-window -v -c "#{pane_current_path}"

  # bind f display-popup -s "bg=${thm_bg_dark}" -E -w70% -h70% -d '#{pane_current_path}' "lf"
  # bind g new-window -c "#{pane_current_path}" lazygit
  # bind h run-shell "tmux switch-client -t mono || tmux new-session -d -s mono -c '$HOME/code/komodor/mono' && tmux switch-client -t mono"
  # bind G run-shell "tmux switch-client -t gh-dash || tmux new-session -d -s gh-dash -c '$HOME/code/dlvhdr/gh-dash' gh dash && tmux switch-client -t gh-dash"
  # bind M run-shell "tmux switch-client -t mprocs || tmux new-session -d -s mprocs -c '$HOME' 'mprocs -c ~/.config/mprocs/mprocs.yaml' && tmux switch-client -t mprocs"
  # bind m new-window woman
  # bind k display-popup -s "bg=${thm_bg_dark}" -w 50% -h 50% -E -T "Kill session" "choose_session_multi.sh | xargs -I_ tmux kill-session -t _"
  # bind P display-message -F "#{pane_current_path}"
  bind S choose-session
  # bind "?" display-popup -E -w70% -h70% "keyb -c ~/.config/keyb/config.yml -k ~/.config/keyb/keyb.yml"

# resizing panes
  bind -n S-Left resize-pane -L 2
  bind -n S-Right resize-pane -R 2
  bind -n S-Down resize-pane -D 1
  bind -n S-Up resize-pane -U 1

  bind -n C-Left resize-pane -L 10
  bind -n C-Right resize-pane -R 10
  bind -n C-Down resize-pane -D 5
  bind -n C-Up resize-pane -U 5

# Resize pane shortcuts
  bind -r H resize-pane -L 10
  bind -r J resize-pane -D 10
  bind -r K resize-pane -U 10
  bind -r L resize-pane -R 10

# default pane switching for when things break
  bind -n C-h select-pane -L
  bind -n C-j select-pane -D
  bind -n C-k select-pane -U
  bind -n C-l select-pane -R

  bind b break-pane -d

  bind -r C-h select-window -t :-
  bind -r C-l select-window -t :+

  bind-key z resize-pane -Z

# Use up and down arrows for temporary "maximize"
  unbind Up; bind Up resize-pane -Z
  unbind Down; bind Down resize-pane -Z

# ==============================================================

#       Window (Tab) Stuff
# ==============================================================

# double press C-z to toggle tabs (windows)
  # bind C-z last-window
  # bind Tab last-window

# Reorder windows
# swap window to left or right
  bind -r < swap-window -d -t -1
  bind -r > swap-window -d -t +1

# ==============================================================

# fzf-speed
  bind-key Tab capture-pane \; save-buffer /tmp/tmux-buffer \; delete-buffer \; display-popup -w 80% -h 60% -E "fzf-speed"

  bind x run-shell "                                          \
    if [ #{session_windows} -eq 1 ] &&                      \
        [ #{window_panes}    -eq 1 ] ; then                  \
        if [ \$(tmux list-sessions | wc -l) -ge 2 ]; then   \
            tmux switch-client -l;                          \
        fi; tmux kill-session -t \"#S\";                    \
    else                                                    \
        tmux kill-pane;                                     \
    fi;                                                     \
    "

# ==============================================================

# eliminate delays when switching modes in vim
  set -sg escape-time 0

# start window numbers at 1 to match keyboard order with tmux window order
  set -g base-index 1
  set-window-option -g pane-base-index 1

# renumber windows sequentially after closing any of them
  set -g renumber-windows on

# increase scrollback lines
  set -g history-limit 100000

# prefix -> back-one-character
  bind-key C-b send-prefix

# prefix-2 -> forward-incremental-history-search
  bind-key C-s send-prefix -2

# =======================================
# Sessions
# ======================================

  # don't detach from tmux when closing a session (just open a different session)
    set -g detach-on-destroy off

# =======================================
# Copy paste stuff
# =================================================

# Allows scrolling and selecting in copy-mode
  set -g mouse on
  bind -n WheelUpPane   select-pane -t= \; copy-mode -e \; send-keys -M
  bind -n WheelDownPane select-pane -t= \;                 send-keys -M

  bind-key -T edit-mode-vi Up send-keys -X history-up
  bind-key -T edit-mode-vi Down send-keys -X history-down

  unbind-key -T copy-mode-vi Space
  unbind-key -T copy-mode-vi Enter
  unbind-key -T copy-mode-vi C-v
  unbind-key -T copy-mode-vi [
  unbind-key -T copy-mode-vi ]

  bind-key -T copy-mode-vi v send-keys -X begin-selection
# MacOS
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
# bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
# Linux
  bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace xsel"
  bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace xsel"
  bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
  bind-key -T copy-mode-vi [ send-keys -X begin-selection
  bind-key -T copy-mode-vi ] send-keys -X copy-selection

# =================================================
# Plugin Setup
# =================================================

# use duckduckgo for searching selected term (<prefix>shift-s)
  set -g @open-S 'https://www.duckduckgo.com/?q='

# for online status
  set -g @online_icon "#[fg=#9dd78e,bold] online"
  set -g @offline_icon "#[fg=#e5706b,bold] offline!"

#==================================================
# Plugins
# =================================================

  set -g @plugin 'tmux-plugins/tpm'
  set -g @plugin 'tmux-plugins/tmux-sensible'
  set -g @plugin 'tmux-plugins/tmux-yank'
  set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

  set -g @plugin 'tmux-plugins/tmux-resurrect'
  set -g @resurrect-dir "$XDG_DATA_HOME/tmux/resurrect".

  set -g @plugin 'tmux-plugins/tmux-continuum'
  set -g @continuum-restore 'off'

  set -g @plugin 'christoomey/vim-tmux-navigator'

# show if connected to internet
  set -g @online_icon " Ôā¨ "
  set -g @offline_icon " Ôôö "
  set -g @plugin 'tmux-plugins/tmux-online-status'
  set -g @plugin 'tmux-plugins/tmux-sessionist'
  set -g @plugin 'tmux-plugins/tmux-copycat'
  set -g @plugin 'nhdaly/tmux-better-mouse-mode'

# Plugin that displays prompt indicating currently active Tmux mode.
  set -g @plugin 'MunifTanjim/tmux-mode-indicator'

# open files/urls selected in copy mode
  set -g @plugin 'dkarter/tmux-open-nvim'

# Fuzzy find panes (prefix-P)
  set -g @plugin 'dkarter/tmux-ff'

# use fzf to copy text from tmux into current command (prefix+TAB)
  set -g @plugin 'laktak/extrakto'

# manage tmux sessions with FZF and zoxide
  set -g @t-fzf-prompt 'ÓĮą '
  set -g @t-fzf-find-binding 'ctrl-f:change-prompt(ÔĀľ )+reload(fd -H -d 2 -t d . ~/dev)'
  set -g @plugin 'joshmedeski/t-smart-tmux-session-manager'

# Resize tmux panes and Vim windows with ease (alt+hjkl)
  set -g @plugin 'RyanMillerC/better-vim-tmux-resizer'

# open urls on the tmux screen, and allow selecting one via fzf
  set -g @fzf-url-fzf-options '-p70% -m -0 --no-preview'
  set -g @plugin 'joshmedeski/tmux-fzf-url'

# show battery status
  set -g @batt_icon_status_charged 'ůįāĄ'
  set -g @batt_icon_status_charging 'ÔÉß'
  set -g @batt_icon_status_discharging ' '
  set -g @batt_icon_charge_tier8 'ůįĀĻ'
  set -g @batt_icon_charge_tier7 'ůįāÄ'
  set -g @batt_icon_charge_tier6 'ůįĀŅ'
  set -g @batt_icon_charge_tier5 'ůįĀĺ'
  set -g @batt_icon_charge_tier4 'ůįĀĹ'
  set -g @batt_icon_charge_tier3 'ůįĀľ'
  set -g @batt_icon_charge_tier2 'ůįĀĽ'
  set -g @batt_icon_charge_tier1 'ůįĀļ'
  set -g @plugin 'tmux-plugins/tmux-battery'

# =================================================

# Local config
  # if-shell "[ -f ~/.tmux.conf.local ]" 'source ~/.tmux.conf.local'

# install tpm if not already installed
	if "test ! -d ~/.tmux/plugins/tpm/tpm" \
   	"run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm || true'
