use-grammars = { only = ["rust", "dockerfile", "pyhton", "go"] }

[[language]]
name = "rust"
scope = "source.rust"
formatter = { command = "rustfmt" }
injection-regex = "rust"
file-types = ["rs"]
roots = ["Cargo.toml", "Cargo.lock"]
auto-format = true
comment-token = "//"
language-servers = ["rust-analyzer"]
indent = { tab-width = 2, unit = " " }

[language-server.rust-analyzer.config]
cargo = { buildScripts = { enable = true }, features = ["ssr"] }
# check = { features = ["ssr"] }
check = { command = "clippy", features = "all" }
diagnostics = { experimental = { enable = true } }
hover = { actions = { enable = true } }
typing = { autoClosingAngleBrackets = { enable = true } }
procMacro = { enable = true }

[Language-server.rust-analyzer.config.inlayHints]
lifetimeElisionHints = { enable = false, useParameterNames = false }
renderColons = true
typeHints = { hideNamedConstructor = true, hideClosureInitialization = true }
parameterHints = { enable = false }
chainingHints = { enable = false }
closureCaptureHints = { enable = true }
closureReturnTypeHints = "always"
expressionAdjustmentHints = "always"

[language.debugger]
name = "lldb-vscode"
transport = "stdio"
command = "lldb-vscode"

[[language.debugger.templates]]
name = "binary"
request = "launch"
completion = [{ name = "binary", completion = "filename" }]
args = { program = "{0}", initCommands = [
  "command script import /usr/local/etc/lldb_vscode_rustc_primer.py",
] }

[[language]]
name = "python"
auto-format = true

[[language]]
name = "cpp"
auto-format = true

[[language]]
name = "c"
auto-format = true

[language-server.clangd]
command = "clangd"
args = [
  "--background-index",
  "--pch-storage=memory",
  "--clang-tidy",
  "--suggest-missing-includes",
  "--cross-file-rename",
  "--completion-style=detailed",
  "--offset-encoding=utf-16",
]

[[language]]
name = "go"
auto-format = true
formatter = { command = "goimports" }
language-servers = ["gopls", "golangcilint"]
indent = { tab-width = 2, unit = " " }

[language-server.gopls]
command = "gopls"
args = ["serve"]
analyses = { unusedparams = true }
staticcheck = true
codelenses = { generate = true }
completion = { usePlaceholders = true }
Inlayhint = { assignVariableTypes = true, compositeLiteralFields = true, compositeLiteralTypes = true, constantValues = true, functionTypeParameters = true, parameterNames = true, rangeVariableTypes = true }

[language-server.golangcilint]
command = "golangci-lint-langserver"
init = [
  "golangci-lint",
  "run",
  "--enable-all",
  "--disable",
  "lll",
  "--out-format",
  "json",
  "--issues-exit-code=1",
]

[language-server.gopls.config.hints]
assignVariableTypes = true
compositeLiteralFields = true
constantValues = true
functionTypeParameters = true
parameterNames = true
rangeVariableTypes = true

[[language]]
name = "cmake"
auto-format = true

