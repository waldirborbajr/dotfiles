format = "$username$hostname$directory$git_branch$git_state$git_status$git_metrics$fill$cmd_duration$nix_shell$nodejs$golang$rust$python$lua$jobs$time$line_break❯ "
palette = "foo"
[cmd_duration]
format = "[$duration]($style) "
style = "mustard bold"

[directory]
format = "[$read_only]($read_only_style)[$path]($style) "
read_only = "🔒 "
style = "directory bold"
truncate_to_repo = false
truncation_length = 3
truncation_symbol = ".../"

[fill]
symbol = " "

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "git_branch bold"

[git_metrics]
added_style = "added bold"
deleted_style = "deleted bold"
disabled = false

[golang]
detect_extensions = ["go"]
detect_files = [
    "go.mod",
    "go.sum",
    "glide.yaml",
    "Gopkg.yml",
    "Gopkg.lock",
    ".go-version",
]
detect_folders = ["Godeps"]
disabled = false
format = "[$symbol($version )]($style)"
style = "bold cyan bg:0x86BBD8"
symbol = " "
version_format = "v$raw"

[hostname]
format = "@[$hostname]($style)$ssh_symbol "
ssh_only = false
ssh_symbol = " 📞"
style = "identity bold"

[jobs]
format = "[$number$symbol]($style)"
style = "mustard bold"
symbol = "⚙ "

[nix_shell]
disabled = false
format = "[$symbol$state( ($name))]($style) "
impure_msg = "[impure](bold red)"
pure_msg = "[pure](bold green)"
style = "bold blue"
symbol = " "

[palettes.foo]
added = "#208020"
deleted = "#a05050"
directory = "#A7A5AB"
git_branch = "#778485"
identity = "#778485"
mustard = "#af8700"
time = "#778485"

[python]
detect_extensions = ["py"]
detect_files = [
    "requirements.txt",
    ".python-version",
    "pyproject.toml",
    "Pipfile",
    "tox.ini",
    "setup.py",
    "__init__.py",
]
detect_folders = []
disabled = false
format = "[$symbol ($version) (($virtualenv) )]($style)"
python_binary = ["python", "python3", "python2"]
style = "yellow bold"
symbol = ""

[rust]
detect_extensions = ["rs"]
detect_files = ["Cargo.toml"]
detect_folders = []
disabled = false
format = "[$symbol($version )]($style)"
style = "bold red bg:0x86BBD8"
symbol = "🦀 "
version_format = "v$raw"

[shell]
bash_indicator = "bsh"
cmd_indicator = "cmd"
disabled = false
elvish_indicator = "esh"
fish_indicator = ""
format = "[$indicator]($style) "
ion_indicator = "ion"
nu_indicator = "nu"
powershell_indicator = "_"
style = "white bold"
tcsh_indicator = "tsh"
unknown_indicator = "mystery shell"
xonsh_indicator = "xsh"
zsh_indicator = "zsh"

[time]
disabled = false
format = "[$time]($style)"
style = "time bold"

[username]
disabled = false
format = "[$user]($style) "
show_always = true
style_root = "red bold bg:0x9A348E"
style_user = "yellow bold bg:0x9A348E"
