aliases:
  clone: repo clone
  co: pr checkout
  ga: dash
  inbox: api notifications --template '{{range .}}{{tablerow .subject.title .subject.url}}{{end}}'
  pl: pr list
  pr: pr create --web
  pv: pr view --web
  v: repo view --web
editor: nvim
git_protocol: ssh
pager: delta
prompt: enabled
version: '1'
