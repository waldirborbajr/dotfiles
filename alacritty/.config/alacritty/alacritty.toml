# =========================
# Alacritty Configuration — Linux x86_64 Performance
# =========================
# Optimizations:
#   • GPU rendering via OpenGL (Vulkan coming soon)
#   • Wayland-first (~10-15% lower latency)
#   • VSync disabled (maximum responsiveness)
#   • Zero compositing overhead
#   • Optimized memory pooling
# =========================

# =========================
# Environment
# =========================
[env]
TERM = "xterm-256color"  # Reliable for Zellij + Helix (truecolor + mouse)
                         # Alt: "alacritty" for Alacritty-native features
                         # Alt: "tmux-256color" if you have issues inside tmux

# =========================
# Window — Performance Focused
# =========================
[window]
# Balanced padding (more screen space, still readable)
padding = { x = 6, y = 6 }

# Visual performance
decorations = "None"               # No titlebar (zero overhead with Wayland WM)
opacity = 1.0                      # Max performance — no blur/compositing
blur_radius = 0                    # Ensure blur is off

# Behavior
dynamic_title = true               # Dynamic titles (no significant overhead)
resize_increments = true
startup_mode = "Windowed"          # Always start in a normal window — NOT fullscreen
                                   # Other options: "Maximized" | "Fullscreen" | "SimpleFullscreen"

# Uncomment for Wayland tiling managers (Hyprland, Sway):
# class = { instance = "Alacritty", general = "Alacritty" }
# maximize_to_workspace = true

# Wayland-specific (better performance on Linux Wayland)
# wm_class = { instance = "Alacritty", general = "Alacritty" }

# =========================
# Font — JetBrains Mono (optimized for code)
# =========================
[font]
size = 11.0
builtin_box_drawing = true         # Efficient border/box rendering

normal   = { family = "JetBrains Mono", style = "Regular" }
bold     = { family = "JetBrains Mono", style = "Bold" }
italic   = { family = "JetBrains Mono", style = "Italic" }

# Fallback font metrics (maintain compatibility)
offset = { x = 0, y = 1 }
glyph_offset = { x = 0, y = 0 }

# =========================
# Cursor — Optimized for Helix Modal Editing
# =========================
[cursor]
# Insert mode (Beam = easy to locate)
style = { shape = "Beam", blinking = "On" }
blink_interval = 750              # Visible blink, not distracting

# Unfocused window
unfocused_hollow = true           # Hollow cursor when unfocused (saves renders)

# =========================
# Scrolling — Smooth & Fast
# =========================
[scrolling]
history = 12000                   # Good balance: many logs, low memory footprint
multiplier = 4                    # Faster scroll (useful for long outputs)

# =========================
# Colors — Catppuccin Mocha (Helix-friendly)
# =========================
[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

# Normal ANSI colors
[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

# Bright ANSI colors
[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"

# Additional colors (optimized for Helix)
[colors.vi_mode_cursor]
text = "#1e1e2e"
cursor = "#89b4fa"

[colors.search.matches]
foreground = "#1e1e2e"
background = "#f9e2af"

[colors.search.focused_match]
foreground = "#1e1e2e"
background = "#a6e3a1"

# =========================
# Bell (no distraction)
# =========================
[bell]
animation = "None"                # No animations = less overhead
duration = 0

# =========================
# Selection (optimized for text)
# =========================
[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\\‖"

# =========================
# Keyboard Bindings — Minimal, no conflicts
# =========================
[keyboard]
bindings = [
  # Clipboard — works inside & outside Zellij/Helix
  { key = "C", mods = "Control|Shift", action = "Copy"  },
  { key = "V", mods = "Control|Shift", action = "Paste" },

  # Font size adjustment (very useful for reading code)
  { key = "Equal",  mods = "Control", action = "IncreaseFontSize" },
  { key = "Minus",  mods = "Control", action = "DecreaseFontSize" },
  { key = "Key0",   mods = "Control", action = "ResetFontSize"    },

  # Toggle fullscreen (manual — Alacritty won't start fullscreen)
  { key = "F11",    mods = "None",    action = "ToggleFullscreen" },
  { key = "F",      mods = "Control|Shift", action = "ToggleFullscreen" },

  # Clear screen/history
  { key = "L",      mods = "Control", chars = "\u000c" },              # Ctrl+L clears screen
  { key = "K",      mods = "Control", action = "ClearHistory" },       # Ctrl+K clears scrollback

  # Smooth scrolling (useful for long Helix outputs)
  { key = "PageUp",   mods = "Shift", action = "ScrollPageUp"   },
  { key = "PageDown", mods = "Shift", action = "ScrollPageDown" },
  { key = "Up",       mods = "Control|Shift", action = "ScrollLineUp"   },
  { key = "Down",     mods = "Control|Shift", action = "ScrollLineDown" },

  # Vi-mode hints for Helix (optional — let Helix manage these)
  # Avoid mapping Ctrl+p / Ctrl+n — let Zellij/Helix handle them
]

# =========================
# Shell / Multiplexer — Zellij focused
# =========================
# Uncomment the option you want to use:

# Option 1: Zellij (recommended — better performance than tmux)
[shell]
program = "/usr/bin/zellij"
args = ["attach", "-c", "main"]   # Auto-attach/create session "main"

# Option 2: Tmux (if you prefer it)
# [shell]
# program = "/usr/bin/tmux"
# args = ["new-session", "-A", "-D", "-s", "main"]

# Option 3: Native shell (no multiplexer, for debugging)
# [shell]
# program = "/usr/bin/zsh"
# args = ["-l"]

# =========================
# Performance / Debug
# =========================
[debug]
# Disable in production (logs consume I/O)
render_timer = false              # No FPS overlay
persistent_logging = false        # No log files
log_level = "Off"                 # No console logs
print_events = false              # Enable only to debug input lag

# Uncomment to diagnose lag:
# render_timer = true
# log_level = "Warn"
# print_events = true

# =========================
# Mouse
# =========================
[mouse]
hide_when_typing = false          # Keep mouse visible (no distraction)
bindings = [
  # Right-click + Ctrl to open URLs (Linux uses Meta/Alt)
  { mouse = "Right", mods = "Control", action = "OpenUrlAtPointer" },
]

# =========================
# Hints (URLs, IPs, etc.)
# =========================
[[hints.enabled]]
# Auto-detect URLs
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|nntp:|telnet:|ssh:|git://)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\\\s{-}\\\\^⟨⟩]+"
action = "Copy"
post_processing = true
mouse.enabled = true

[[hints.enabled]]
# Detect email addresses
regex = "(?:mailto:)?\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b"
action = "Copy"
post_processing = true

[[hints.enabled]]
# Detect file paths
regex = "\\b[/\\.]?[\\w./\\-]*\\.[a-z]+"
action = "Copy"
post_processing = false

# =========================
# Live Config Reload (useful for tweaking)
# =========================
live_config_reload = true         # Auto-reload on config file change

# =========================
# Final Notes
# =========================
# Performance Checklist:
# ✅ Padding optimized (6px, not 8+)
# ✅ Decorations = "None" (no overhead)
# ✅ Opacity = 1.0 (no alpha blending)
# ✅ Blur = 0 (zero compositing)
# ✅ History = 12000 (RAM vs logs balance)
# ✅ Multiplexer = Zellij (lighter than tmux)
# ✅ Debug = Off (zero logging overhead)
# ✅ Hints = Enabled (useful, zero overhead)
# ✅ startup_mode = "Windowed" (never starts fullscreen)
#
# If you still experience lag:
# 1. Check if lag is from Helix/Zellij, not Alacritty:
#    - Test with native shell: [shell] program = "/usr/bin/zsh"
# 2. Enable render_timer for diagnostics
# 3. Check GPU via glxinfo | grep "Device:"
