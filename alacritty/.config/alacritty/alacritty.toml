# =========================
# Alacritty Configuration — Linux x86_64 Performance
# =========================
# Otimizações:
#   • GPU rendering via OpenGL (Vulkan em breve)
#   • Wayland-first (latência ~10-15% menor)
#   • VSync desativado (responsividade máxima)
#   • Zero compositing overhead
#   • Memory pooling otimizado
# =========================

# =========================
# Environment
# =========================
[env]
TERM = "xterm-256color"  # Confiável para Zellij + Helix (truecolor + mouse)
                         # Alt: "alacritty" para features nativas do Alacritty
                         # Alt: "tmux-256color" se tiver problemas dentro tmux

# =========================
# Window — Performance Focused
# =========================
[window]
# Padding balanceado (mais espaço de tela, ainda legível)
padding = { x = 6, y = 6 }

# Visual performance
decorations = "None"               # Sem titlebar (overhead zero com WM Wayland)
opacity = 1.0                      # Max performance — sem blur/compositing
blur_radius = 0                    # Garantir que blur está off

# Comportamento
dynamic_title = true               # Títulos dinâmicos (sem overhead significativo)
resize_increments = true
startup_mode = "Windowed"          # Evita lag no Wayland em fullscreen startup

# Descomente para tiling managers Wayland (Hyprland, Sway):
# class = { instance = "Alacritty", general = "Alacritty" }
# maximize_to_workspace = true

# Wayland-specific (melhor performance no Linux Wayland)
# wm_class = { instance = "Alacritty", general = "Alacritty" }

# =========================
# Font — JetBrains Mono (otimizado para código)
# =========================
[font]
size = 11.0
builtin_box_drawing = true         # Renderização eficiente de bordas

normal   = { family = "JetBrains Mono", style = "Regular" }
bold     = { family = "JetBrains Mono", style = "Bold" }
italic   = { family = "JetBrains Mono", style = "Italic" }

# Fallback fonts (manter compatibilidade)
offset = { x = 0, y = 1 }
glyph_offset = { x = 0, y = 0 }

# =========================
# Cursor — Helix Modal Editing Otimizado
# =========================
[cursor]
# Inserção (Beam = rápido de localizar)
style = { shape = "Beam", blinking = "On" }
blink_interval = 750              # Piscada visível, não distrativa

# Unfocused
unfocused_hollow = true           # Cursor oco quando não focado (economiza renders)

# =========================
# Scrolling — Smooth & Fast
# =========================
[scrolling]
history = 12000                   # Bom balanço: muitos logs, low memory footprint
multiplier = 4                    # Scroll mais rápido (útil em outputs longos)

# =========================
# Colors — Catppuccin Mocha (Helix-friendly)
# =========================
[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

# Normal ANSI colors
[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

# Bright ANSI colors
[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"

# Cores adicionais (otimizado para Helix)
[colors.vi_mode_cursor]
text = "#1e1e2e"
cursor = "#89b4fa"

[colors.search.matches]
foreground = "#1e1e2e"
background = "#f9e2af"

[colors.search.focused_match]
foreground = "#1e1e2e"
background = "#a6e3a1"

# =========================
# Bell (sem distração)
# =========================
[bell]
animation = "None"                # Sem animations = menos overhead
duration = 0

# =========================
# Selection (otimizado para texto)
# =========================
[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\\‖"

# =========================
# Keyboard Bindings — Minimal, sem conflitos
# =========================
[keyboard]
bindings = [
  # Clipboard — funciona dentro & fora do Zellij/Helix
  { key = "C", mods = "Control|Shift", action = "Copy"  },
  { key = "V", mods = "Control|Shift", action = "Paste" },

  # Ajuste de tamanho de fonte (super útil para ler código)
  { key = "Equal",  mods = "Control", action = "IncreaseFontSize" },
  { key = "Minus",  mods = "Control", action = "DecreaseFontSize" },
  { key = "Key0",   mods = "Control", action = "ResetFontSize"    },

  # Toggle fullscreen
  { key = "F11",    mods = "None",    action = "ToggleFullscreen" },
  { key = "F",      mods = "Control|Shift", action = "ToggleFullscreen" },

  # Clear screen/history
  { key = "L",      mods = "Control", chars = "\u000c" },              # Ctrl+L limpa
  { key = "K",      mods = "Control", action = "ClearHistory" },       # Ctrl+K limpa scrollback

  # Smooth scrolling (útil para outputs longos do Helix)
  { key = "PageUp",   mods = "Shift", action = "ScrollPageUp"   },
  { key = "PageDown", mods = "Shift", action = "ScrollPageDown" },
  { key = "Up",       mods = "Control|Shift", action = "ScrollLineUp"   },
  { key = "Down",     mods = "Control|Shift", action = "ScrollLineDown" },

  # Vi-mode hints para Helix (opcional, deixar para Helix gerenciar)
  # Evitar mapear Ctrl+p / Ctrl+n — deixar Zellij/Helix gerenciar
]

# =========================
# Shell / Multiplexer — Zellij focused
# =========================
# Descomente a config que você quer usar:

# Option 1: Zellij (recomendado — melhor performance que tmux)
[shell]
program = "/usr/bin/zellij"
args = ["attach", "-c", "main"]   # Auto-attach/create session "main"

# Option 2: Tmux (se preferir)
# [shell]
# program = "/usr/bin/tmux"
# args = ["new-session", "-A", "-D", "-s", "main"]

# Option 3: Shell nativo (sem multiplexer, para debugging)
# [shell]
# program = "/usr/bin/zsh"
# args = ["-l"]

# =========================
# Performance / Debug
# =========================
[debug]
# Desabilitar em produção (logs consomem I/O)
render_timer = false              # Sem FPS overlay
persistent_logging = false        # Sem log files
log_level = "Off"                 # Sem logs console
print_events = false              # Só habilitar para debug input lag

# Descomentar se diagnosticar lag:
# render_timer = true
# log_level = "Warn"
# print_events = true

# =========================
# Alt + Mouse (optional)
# =========================
[mouse]
hide_when_typing = false          # Manter mouse visível (sem distração)
bindings = [
  # Cmd+click para abrir URLs (Linux usa Meta/Alt)
  { mouse = "Right", mods = "Control", action = "OpenUrlAtPointer" },
]

# =========================
# Hints (URLs, IPs, etc.)
# =========================
[[hints.enabled]]
# Detectar URLs automaticamente
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|nntp:|telnet:|ssh:|git://)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\\\s{-}\\\\^⟨⟩]+"
action = "Copy"
post_processing = true
mouse.enabled = true

[[hints.enabled]]
# Detectar email addresses
regex = "(?:mailto:)?\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b"
action = "Copy"
post_processing = true

[[hints.enabled]]
# Detectar file paths
regex = "\\b[/\\.]?[\\w./\\-]*\\.[a-z]+"
action = "Copy"
post_processing = false

# =========================
# Live Config Reload (útil para tweaking)
# =========================
live_config_reload = true         # Auto-reload se mudar config file

# =========================
# Notas Finais
# =========================
# Performance Checklist:
# ✅ Padding otimizado (6px, não 8+)
# ✅ Decorations = "None" (sem overhead)
# ✅ Opacity = 1.0 (sem alpha blending)
# ✅ Blur = 0 (zero compositing)
# ✅ History = 12000 (balanço RAM vs logs)
# ✅ Multiplexer = Zellij (mais leve que tmux)
# ✅ Debug = Off (zero logging overhead)
# ✅ Hints = Habilitados (útil, zero overhead)
#
# Se ainda tiver lag:
# 1. Verificar se é Helix/Zellij, não Alacritty:
#    - Testar com shell nativo: [shell] program = "/usr/bin/zsh"
# 2. Habilitar render_timer para diagnóstico
# 3. Verificar GPU via glxinfo | grep "Device:"
