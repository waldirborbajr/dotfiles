# =========================
# Environment
# =========================
[env]
TERM = "xterm-256color"  # Reliable for Zellij + Helix (truecolor + mouse support)
                         # Alternative: "tmux-256color" if you notice issues inside tmux only

# =========================
# Window
# =========================
[window]
padding = { x = 6, y = 6 }         # Balanced: more screen real estate, still readable
decorations = "None"               # Clean, distraction-free (great with tiling WMs)
opacity = 1.0                      # Max performance — no blur/compositing overhead
blur = false
dynamic_title = true
resize_increments = true
startup_mode = "Windowed"          # Avoids potential Wayland input lag on Fullscreen startup
# maximize_to_workspace = true     # Uncomment for Hyprland/Sway (Wayland tiling managers)

# =========================
# Performance / Debug
# =========================
[debug]
render_timer = false
persistent_logging = false
log_level = "Off"
print_events = false               # Only enable for debugging input lag

# =========================
# Shell / Multiplexer — Zellij focused
# =========================
# [terminal.shell]
# program = "/usr/bin/zellij"        # Full path for reliability on Fedora
# args = []                          # Zellij auto-attaches or creates session smartly
                                   # Optional: args = ["attach", "-c", "main"] for auto-create "main" session
# [terminal.shell]
# program = "/usr/bin/tmux"          # ou "/usr/bin/zellij" se quiser testar
# args = ["new-session", "-A", "-D", "-s", "main"]   # nome mais curto = mais rápido de digitar

# =========================
# Font (JetBrains Mono — perfect for code)
# =========================
[font]
size = 13.0
builtin_box_drawing = true

normal   = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold     = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic   = { family = "JetBrainsMono Nerd Font", style = "Italic" }

offset = { x = 0, y = 1 }
glyph_offset = { x = 0, y = 0 }

# =========================
# Cursor (optimized for Helix modal editing)
# =========================
[cursor]
unfocused_hollow = true
style = { shape = "Beam", blinking = "On" }      # Beam helps spot insert mode quickly
vi_mode_style = { shape = "Block", blinking = "Off" }  # Block in Helix normal mode

blink_interval = 750   # Visible but not distracting

# =========================
# Scrolling (smooth for Helix :log, cargo output, etc.)
# =========================
[scrolling]
history = 12000            # Good balance: plenty for logs, low memory footprint
multiplier = 4             # Faster feel when scrolling long buffers

# =========================
# Colors — Catppuccin Mocha (very Helix-friendly)
# =========================
[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"

# =========================
# Keyboard bindings (minimal, no Zellij/Helix conflicts)
# =========================
[keyboard]
bindings = [
  # Clipboard — works inside & outside Zellij/Helix
  { key = "C", mods = "Control|Shift", action = "Copy"  },
  { key = "V", mods = "Control|Shift", action = "Paste" },

  # Font size adjustments (super useful when reading code)
  { key = "Equal",  mods = "Control", action = "IncreaseFontSize" },
  { key = "Minus",  mods = "Control", action = "DecreaseFontSize" },
  { key = "Key0",   mods = "Control", action = "ResetFontSize"    },

  # Fullscreen toggle
  { key = "F11",    mods = "None",    action = "ToggleFullscreen" },
  { key = "F",      mods = "Control|Shift", action = "ToggleFullscreen" },

  # Clear screen/history
  { key = "L",      mods = "Control", chars = "\u000c" },           # Ctrl+L clears
  { key = "K",      mods = "Control", action = "ClearLogNotice" },

  # Smooth scrolling (handy for long Helix outputs)
  { key = "PageUp",   mods = "Shift", action = "ScrollPageUp"   },
  { key = "PageDown", mods = "Shift", action = "ScrollPageDown" },
  { key = "Up",       mods = "Control|Shift", action = "ScrollLineUp"   },
  { key = "Down",     mods = "Control|Shift", action = "ScrollLineDown" },

  # Optional: If you want Alacritty-level pane shortcuts (but Zellij does this better natively)
  # Avoid remapping Ctrl+p / Ctrl+n etc. — let Zellij handle them
]
