# =============================================================================
# Alacritty Configuration
# Nord Theme — optimized for speed + security
# Linux x86_64 + macOS Apple Silicon (M2)
#
# HOW TO SWITCH OS:
#   Linux → keep [linux] block uncommented, comment out [macos] block
#   macOS → keep [macos] block uncommented, comment out [linux] block
# =============================================================================

[general]
live_config_reload = true

# =============================================================================
# Platform — Linux
# Comment this entire block when using macOS
# =============================================================================
[env]
TERM = "xterm-256color"

[window]
padding = { x = 6, y = 6 }
decorations = "None"                       # No titlebar — zero WM overhead
opacity = 1.0                              # No alpha blending
dynamic_title = true
resize_increments = true
startup_mode = "Windowed"
dimensions = { columns = 118, lines = 30 }

# =============================================================================
# Platform — macOS (Apple Silicon M2)
# Uncomment this block and comment the Linux block above when on macOS
# =============================================================================
# [env]
# TERM = "xterm-256color"
#
# [window]
# padding           = { x = 8, y = 8 }
# decorations       = "Buttonless"  # Hides buttons, keeps native macOS shadow
# opacity           = 1.0
# dynamic_title     = true
# resize_increments = true
# startup_mode      = "Windowed"
# dimensions        = { columns = 118, lines = 30 }
# option_as_alt     = "OnlyLeft"    # Left Option as Meta (useful for zsh/nvim)

# =============================================================================
# Font
# =============================================================================
[font]
size = 11.0
builtin_box_drawing = true

normal = { family = "JetBrains Mono", style = "Regular" }
bold = { family = "JetBrains Mono", style = "Bold" }
italic = { family = "JetBrains Mono", style = "Italic" }

offset = { x = 0, y = 1 }
glyph_offset = { x = 0, y = 0 }

# =============================================================================
# Cursor — optimized for Helix/vi modal editing
# =============================================================================
[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 750
unfocused_hollow = true

# =============================================================================
# Scrolling
# =============================================================================
[scrolling]
history = 12000
multiplier = 4

# =============================================================================
# Colors — Nord (nordtheme/alacritty, official palette)
# Source: https://github.com/nordtheme/alacritty
# =============================================================================
[colors.primary]
background = "#2e3440"
foreground = "#d8dee9"
dim_foreground = "#a5abb6"

[colors.cursor]
text = "#2e3440"
cursor = "#d8dee9"

[colors.vi_mode_cursor]
text = "#2e3440"
cursor = "#d8dee9"

[colors.selection]
text = "CellForeground"
background = "#4c566a"

[colors.search.matches]
foreground = "CellBackground"
background = "#88c0d0"

[colors.footer_bar]
background = "#434c5e"
foreground = "#d8dee9"

[colors.normal]
black = "#3b4252"
red = "#bf616a"
green = "#a3be8c"
yellow = "#ebcb8b"
blue = "#81a1c1"
magenta = "#b48ead"
cyan = "#88c0d0"
white = "#e5e9f0"

[colors.bright]
black = "#4c566a"
red = "#bf616a"
green = "#a3be8c"
yellow = "#ebcb8b"
blue = "#81a1c1"
magenta = "#b48ead"
cyan = "#8fbcbb"
white = "#eceff4"

[colors.dim]
black = "#373e4d"
red = "#94545d"
green = "#809575"
yellow = "#b29e75"
blue = "#68809a"
magenta = "#8c738c"
cyan = "#6d96a5"
white = "#aeb3bb"

# =============================================================================
# Bell — disabled
# =============================================================================
[bell]
animation = "Linear"
duration = 0

# =============================================================================
# Selection
# =============================================================================
[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\\‖"

# =============================================================================
# Security — disable clipboard injection and URL auto-open
# OSC52 allows remote processes to write to your clipboard silently.
# Disabling it prevents a common terminal escape-sequence attack vector.
# =============================================================================
[terminal]
osc52 = "Disabled"

# Shell — active (set to your preferred multiplexer below if needed)
# Linux example with Zellij:
#   program = "/usr/bin/zellij"
#   args    = ["attach", "-c", "main"]
# macOS example with Zellij via Homebrew:
#   program = "/opt/homebrew/bin/zellij"
#   args    = ["attach", "-c", "main"]
[terminal.shell]
program = "/usr/bin/zsh"
args = ["-l"]

# =============================================================================
# Mouse — no auto-open on click (security)
# =============================================================================
[mouse]
hide_when_typing = false
# bindings intentionally empty: right-click open removed (security)

# =============================================================================
# Hints — URLs copied on keyboard hint only, not auto-opened on click
# Removes the click-to-open vector while keeping keyboard-driven URL copy
# =============================================================================
[[hints.enabled]]
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|ssh:|git://)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\\\s{-}\\\\^⟨⟩]+"
action = "Copy"
post_processing = true
mouse.enabled = false                                                                                                                                     # no click-to-open
[hints.enabled.binding]
key = "U"
mods = "Control|Shift"

# =============================================================================
# Keyboard Bindings
# =============================================================================
[keyboard]
bindings = [
  # Clipboard
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", action = "Paste" },

  # Font size
  { key = "=", mods = "Control", action = "IncreaseFontSize" },
  { key = "+", mods = "Control", action = "IncreaseFontSize" },
  { key = "-", mods = "Control", action = "DecreaseFontSize" },
  { key = "0", mods = "Control", action = "ResetFontSize" },

  # Fullscreen
  { key = "F11", mods = "None", action = "ToggleFullscreen" },
  { key = "F", mods = "Control|Shift", action = "ToggleFullscreen" },

  # Scrollback
  { key = "PageUp", mods = "Shift", action = "ScrollPageUp" },
  { key = "PageDown", mods = "Shift", action = "ScrollPageDown" },
  { key = "Up", mods = "Control|Shift", action = "ScrollLineUp" },
  { key = "Down", mods = "Control|Shift", action = "ScrollLineDown" },

  # Clear
  { key = "L", mods = "Control", chars = "\u000c" },
  { key = "K", mods = "Control", action = "ClearHistory" },
]

# =============================================================================
# Performance / Debug — all off in production
# =============================================================================
[debug]
render_timer = false
persistent_logging = false
log_level = "Off"
print_events = false
