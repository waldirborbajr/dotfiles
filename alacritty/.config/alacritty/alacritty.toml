# =========================
# Ambiente
# =========================
[env]
TERM = "xterm-256color"           # bom padrão, mas tmux/zellij gostam de "tmux-256color" em alguns casos

# =========================
# Janela / Window
# =========================
[window]
padding = { x = 6, y = 6 }         # um pouco menor = mais área útil sem perder conforto
decorations = "None"               # mantém (bom para fullscreen/workflow limpo)
opacity = 1.0                      # 1.0 = máxima performance (evita composição extra)
blur = false                       # já está bom
dynamic_title = true
resize_increments = true
startup_mode = "Windowed"          # Fullscreen pode causar micro-lags em alguns drivers Wayland → mude para Maximizado se quiser
# maximize_to_workspace = true     # descomente se usa Wayland + tiling (hyprland/sway)

# =========================
# Performance / Debug
# =========================
[debug]
render_timer = false
persistent_logging = false
log_level = "Off"                  # ótimo para prod
print_events = false               # desative se não estiver debugando

# =========================
# Shell / Multiplexer
# =========================
# [terminal.shell]
# program = "/usr/bin/tmux"          # ou "/usr/bin/zellij" se quiser testar
# args = ["new-session", "-A", "-D", "-s", "main"]   # nome mais curto = mais rápido de digitar

# Alternativa Zellij (mais moderno, UI melhor, mouse first-class)
# program = "/usr/bin/zellij"
# args = []   # zellij detecta attach automaticamente na maioria dos casos

# =========================
# Fonte (ótima escolha)
# =========================
[font]
size = 13.0
builtin_box_drawing = true

normal   = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold     = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic   = { family = "JetBrainsMono Nerd Font", style = "Italic" }

offset = { x = 0, y = 1 }
glyph_offset = { x = 0, y = 0 }

# =========================
# Cursor
# =========================
[cursor]
unfocused_hollow = true
style = { shape = "Beam", blinking = "On" }          # Beam + blink ajuda na visibilidade
vi_mode_style = { shape = "Block", blinking = "Off" }

blink_interval = 750   # padrão é bom, mas pode testar 500–800

# =========================
# Scrolling (mais fluido)
# =========================
[scrolling]
history = 12000            # 5k–20k é faixa boa (mais que 30k começa a pesar em RAM)
multiplier = 4             # scroll mais rápido (3–6 é confortável)

# =========================
# Cores — Catppuccin Mocha (mantido, excelente)
# =========================
[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"

# =========================
# Teclado — Bindings úteis para produtividade
# =========================
[keyboard]
bindings = [
  # Clipboard (padrão moderno)
  { key = "C", mods = "Control|Shift", action = "Copy"  },
  { key = "V", mods = "Control|Shift", action = "Paste" },

  # Fonte size (muito usado)
  { key = "Equal",  mods = "Control",       action = "IncreaseFontSize" },
  { key = "Minus",  mods = "Control",       action = "DecreaseFontSize" },
  { key = "Key0",   mods = "Control",       action = "ResetFontSize"    },

  # Fullscreen / Maximizar
  { key = "F11",    mods = "None",          action = "ToggleFullscreen" },
  { key = "F",      mods = "Control|Shift", action = "ToggleFullscreen" },

  # Limpar tela + scrollback
  { key = "L",      mods = "Control",       chars = "\u000c" },           # Ctrl+L
  { key = "K",      mods = "Control",       action = "ClearLogNotice" },  # limpa mais agressivo

  # Scroll mais confortável
  { key = "PageUp",   mods = "Shift",     action = "ScrollPageUp",   mode = "~Alt" },
  { key = "PageDown", mods = "Shift",     action = "ScrollPageDown", mode = "~Alt" },
  { key = "Up",       mods = "Control|Shift", action = "ScrollLineUp"   },
  { key = "Down",     mods = "Control|Shift", action = "ScrollLineDown" },

  # tmux-like splits (usando Super/Windows = mais ergonômico no Linux)
  { key = "D", mods = "Super",        chars = "\u0002\""  },   # split horizontal
  { key = "D", mods = "Super|Shift",  chars = "\u0002%"   },   # split vertical
  { key = "Z", mods = "Super",        chars = "\u0002z"   },   # zoom pane
  { key = "O", mods = "Super",        chars = "\u0002o"   },   # next pane

  # Zellij常用快捷键 (se mudar para zellij)
  # { key = "P", mods = "Super", chars = "\u0010" },   # modo pane (exemplo)
]
