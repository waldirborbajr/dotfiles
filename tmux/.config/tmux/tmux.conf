##############################################################################
# TMUX CONFIGURATION - OPTIMIZED FOR NEOVIM + Helix + WEZTERM 
##############################################################################

##############################################################################
# 1. CORE & TERMINAL SETTINGS
##############################################################################
# set -g default-shell /bin/zsh

set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colors

set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'wezterm*:extkeys'

# True Color - Otimizado para WezTerm + Alacritty
set -ag terminal-features ",*:RGB"
set -ag terminal-features ",wezterm:RGB"
set -ag terminal-features ",alacritty:RGB"
set -ag terminal-features ",kitty:RGB"
# set -ga terminal-overrides ",xterm-256color:Tc"

set -g set-clipboard on
set -g focus-events on
set -g status-position bottom
set -g status-interval 10
set -g display-time 1000
set -g history-limit 30000

##############################################################################
# 2. BEHAVIOR & PERFORMANCE
##############################################################################
set -g mouse on
set -g repeat-time 600
setw -g monitor-activity off
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on
set -g automatic-rename-format '#{pane_current_command}'

##############################################################################
# 3. KEY BINDINGS - PREFIX
##############################################################################
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# Fast reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "󰑓 tmux reloaded!"

##############################################################################
