# bind -n M-j if-shell "$is_vim" 'send-keys M-j' 'select-pane -D'
# bind -n M-k if-shell "$is_vim" 'send-keys M-k' 'select-pane -U'
# bind -n M-l if-shell "$is_vim" 'send-keys M-l' 'select-pane -R'

# Ctrl + hjkl (alternativa)
# bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
# bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
# bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
# bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

##############################################################################
# 5. PANE RESIZING
##############################################################################
# bind -r H resize-pane -L 5
# bind -r J resize-pane -D 5
# bind -r K resize-pane -U 5
# bind -r L resize-pane -R 5

##############################################################################
# 6. WINDOW & SPLIT MANAGEMENT
##############################################################################
# unbind %
# unbind '"'

bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# bind v split-window -h -c "#{pane_current_path}"
# bind s split-window -v -c "#{pane_current_path}"
# bind c new-window -c "#{pane_current_path}"

# bind m resize-pane -Z

# Window navigation
# bind -n S-Left previous-window
# bind -n S-Right next-window
# bind -n M-H previous-window
# bind -n M-L next-window

# Quick window access
# bind -n M-1 select-window -t 1
# bind -n M-2 select-window -t 2
# bind -n M-3 select-window -t 3
# bind -n M-4 select-window -t 4
# bind -n M-5 select-window -t 5

##############################################################################
# 7. COPY MODE (VI)
##############################################################################
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

##############################################################################
# 8. COLOR THEME - NORD
##############################################################################

# Polar Night
thm_bg="#2e3440"      # main background
thm_bg_alt="#3b4252"  # status segments / inactive elements
thm_gray="#4c566a"    # borders / separators

# Snow Storm
thm_fg="#d8dee9"      # normal text
thm_fg_alt="#e5e9f0"  # brighter text
thm_fg_bright="#eceff4"

# Frost
thm_blue="#81a1c1"
thm_cyan="#88c0d0"

# Aurora
thm_green="#a3be8c"
thm_yellow="#ebcb8b"
thm_red="#bf616a"
thm_magenta="#b48ead"

##############################################################################
# 9. STATUS BAR - NORD
##############################################################################

set -g status on
set -g status-bg "$thm_bg"
set -g status-fg "$thm_fg"

set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100

# Left side
set -g status-left ""

# Right side
set -g status-right "#[fg=$thm_cyan,bg=$thm_bg_alt,bold] #S #[fg=$thm_bg,bg=$thm_blue,bold] #I:#P "

# Window list
set -g window-status-separator ""

set -g window-status-style \
    "fg=$thm_fg,bg=$thm_bg"

set -g window-status-current-style \
    "fg=$thm_fg_bright,bg=$thm_bg_alt,bold"

set -g window-status-format \
    " #I:#W "

set -g window-status-current-format \
    " #I:#W "

# Pane borders
set -g pane-border-style \
    "fg=$thm_gray"

set -g pane-active-border-style \
    "fg=$thm_cyan"

# Messages
set -g message-style \
    "fg=$thm_fg_bright,bg=$thm_bg_alt"

# Copy mode
set -g mode-style \
    "fg=$thm_bg,bg=$thm_cyan,bold"

# Command prompt
set -g message-command-style \
    "fg=$thm_fg_bright,bg=$thm_bg_alt"

##############################################################################
# 10. PLUGINS
##############################################################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'kampanosg/tmux-lazygit-popup'

# Session Persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

##############################################################################
# 11. TPM BOOTSTRAP (MUST BE AT THE BOTTOM)
##############################################################################
if "test ! -d ~/.config/tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run "$HOME/.config/tmux/plugins/tpm/tpm"
