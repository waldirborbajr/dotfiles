##############################################################################
# TMUX CONFIGURATION - OPTIMIZED FOR PERFORMANCE & DEVOPS WORKFLOW
# Theme: Tokyo Night Moon | Prefix: C-a | Vim-style Navigation
##############################################################################

##############################################################################
# 1. CORE & TERMINAL SETTINGS
##############################################################################

set -g default-shell /bin/zsh
set -ag terminal-overrides ",*:RGB"
set -g set-clipboard on
set -g focus-events on
set -g status-position bottom
set -g status-interval 5
set -g display-time 800

##############################################################################
# 2. BEHAVIOR & PERFORMANCE
##############################################################################

set -g history-limit 15000
set -g mouse on
set -g repeat-time 600
setw -g monitor-activity off

##############################################################################
# 3. INDEXING & WINDOW MANAGEMENT
##############################################################################

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on
set -g automatic-rename-format '#{pane_current_command}'

##############################################################################
# 4. KEY BINDINGS - PREFIX
##############################################################################

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Fast config reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "󰑓 tmux reloaded"

##############################################################################
# 5. PANE NAVIGATION (VIM STYLE)
##############################################################################

# With prefix
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Without prefix (Alt + hjkl)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Ctrl + arrows (alternative)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

##############################################################################
# 6. PANE RESIZING
##############################################################################

bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Arrow key resize (alternative)
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 3
bind -r Down  resize-pane -D 3

##############################################################################
# 7. WINDOW & SPLIT MANAGEMENT
##############################################################################

unbind %
unbind '"'

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# New window
bind c new-window -c "#{pane_current_path}"

# Maximize/restore pane
bind m resize-pane -Z

# Window switching
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -n M-H previous-window
bind -n M-L next-window

# Quick window access (Alt+number)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

##############################################################################
# 8. COPY MODE (VI)
##############################################################################

setw -g mode-keys vi

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

unbind -T copy-mode-vi MouseDragEnd1Pane

##############################################################################
# 9. COLOR THEME - TOKYO NIGHT MOON
##############################################################################

set -g thm_bg "#222436"
set -g thm_fg "#c8d3f5"
set -g thm_cyan "#86e1fc"
set -g thm_black "#1b1d2b"
set -g thm_gray "#3a3f5a"
set -g thm_magenta "#c099ff"
set -g thm_pink "#ff757f"
set -g thm_red "#ff757f"
set -g thm_green "#c3e88d"
set -g thm_yellow "#ffc777"
set -g thm_blue "#82aaff"
set -g thm_orange "#ff9e64"
set -g thm_black4 "#444a73"

##############################################################################
# 10. STATUS BAR & APPEARANCE
##############################################################################

set -g status "on"
set -g status-bg "#{thm_bg}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

set -g message-style "fg=#{thm_cyan},bg=#{thm_gray},align=centre"
set -g message-command-style "fg=#{thm_cyan},bg=#{thm_gray},align=centre"

set -g pane-border-style "fg=#{thm_gray}"
set -g pane-active-border-style "fg=#{thm_blue}"

set -g window-status-activity-style "fg=#{thm_fg},bg=#{thm_bg},none"
set -g window-status-separator ""
set -g window-status-style "fg=#{thm_fg},bg=#{thm_bg},none"

set -g window-status-current-format "#[fg=#{thm_blue},bg=#{thm_bg}] #I: #[fg=#{thm_magenta},bg=#{thm_bg}](✓) #[fg=#{thm_cyan},bg=#{thm_bg}]#(echo '#{pane_current_path}' | rev | cut -d'/' -f-2 | rev) #[fg=#{thm_magenta},bg=#{thm_bg}]"
set -g window-status-format "#[fg=#{thm_blue},bg=#{thm_bg}] #I: #[fg=#{thm_fg},bg=#{thm_bg}]#W"

set -g status-right "#[fg=#{thm_blue},bg=#{thm_bg},nobold,nounderscore,noitalics]#[fg=#{thm_bg},bg=#{thm_blue},nobold,nounderscore,noitalics] #[fg=#{thm_fg},bg=#{thm_gray}] #W #{?client_prefix,#[fg=#{thm_magenta}],#[fg=#{thm_cyan}]}#[bg=#{thm_gray}]#{?client_prefix,#[bg=#{thm_magenta}],#[bg=#{thm_cyan}]}#[fg=#{thm_bg}] #[fg=#{thm_fg},bg=#{thm_gray}] #S "
set -g status-left ""

set -g clock-mode-colour "#{thm_blue}"
set -g mode-style "fg=#{thm_blue},bg=#{thm_black4},bold"

##############################################################################
# 11. CUSTOM BINDINGS & VIM NAVIGATOR
##############################################################################

# Sessionizer
bind-key -r f run-shell "tmux neww ~/bin/scripts/tmux-sessionizer"
bind-key -r D run-shell "tmux neww ~/bin/scripts/tmux-sessionizer ~/dotfiles"

# Vim navigator detection
is_vim="\
echo '#{pane_current_command}' | grep -iqE '^@vim_navigator_pattern$' && exit 0
echo '#{pane_current_command}' | grep -iqE '^(bash|zsh|fish)$' && exit 1
ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +@vim_navigator_pattern$'"
set -g @vim_navigator_check "${is_vim}"

##############################################################################
# 12. PLUGINS
##############################################################################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'joshmedeski/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'accessd/tmux-agent-indicator'
set -g @plugin 'kampanosg/tmux-lazygit-popup'

##############################################################################
# 13. SESSION PERSISTENCE
##############################################################################

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-processes 'ssh kubectl helm terraform nvim vim'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

##############################################################################
# 14. TPM BOOTSTRAP (MUST BE AT THE END)
##############################################################################

# Auto-install TPM if not present
if "test ! -d ~/.config/tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM
run "$HOME/.config/tmux/plugins/tpm/tpm"