# ‚ēö‚ēź‚ēź‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēĚ
#    ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚ēö‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ
#    ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēó
#    ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚ēö‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚ēó
#    ‚ēö‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ
# Terminal multiplexer
# https://github.com/tmux/tmux

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

# 24-bit colors
  set -g default-terminal "tmux-256color"
  set -sa terminal-features ",xterm-256color:RGB"
  set -ga terminal-overrides ",alacritty:RGB"

# set -g allow-passthrough on
  set -ga update-environment TERM
  set -ga update-environment TERM_PROGRAM
  set -ga update-environment FZF_DEFAULT_OPTS

# act like vim
  setw -g mode-keys vi

# enable focus events
  set -g focus-events on

  set -g set-clipboard on      # use system clipboard

# we lost the default binding of C-l for clearing screen
# this line of code fixes it by allowing us to use prefix + C-l
  bind C-l send-keys 'C-l'

# setup leader key
  unbind C-b
  set -g prefix C-a

# shortcuts for iterating on tmux config
  # unbind r
  bind-key C-r source-file ~/.config/tmux/tmux.conf \; display-message '~/.tmux.conf is reloaded ūüöÄ'
  bind-key M split -h 'nvim ~/.config/tmux/tmux.conf'

# ==============================================================
# Appearance
# ==============================================================

# start index from 1
# Start windows and panes at 1, not 0
  set -g status-position top
  set -g base-index 1
  set -g pane-base-index 1
  set-window-option -g pane-base-index 1
  set-option -g renumber-windows on

# prevent auto window renaming once I renamed it
  set -g allow-rename off

# ==============================================================
# Pane Stuff
# ==============================================================

# Rename session and window
  bind r command-prompt -I "#{window_name}" "rename-window '%%'"
  bind R command-prompt -I "#{session_name}" "rename-session '%%'"

# new window and retain cwd
  bind c new-window -c "#{pane_current_path}"

# Split panes
  bind-key '-' split-window -v -c "#{pane_current_path}"
  bind-key '\' split-window -h -c "#{pane_current_path}"
  bind-key '_' split-window -fv -c "#{pane_current_path}"
  bind-key '|' split-window -fh -c "#{pane_current_path}"

# Zoom pane
  bind-key + resize-pane -Z

# Resize panes using PREFIX H, J, K, L
  bind -r H resize-pane -L 5
  bind -r J resize-pane -D 5
  bind -r K resize-pane -U 5
  bind -r L resize-pane -R 5

# ==============================================================

#       Window (Tab) Stuff
# ==============================================================

# ==============================================================

# fzf-speed
  bind-key Tab capture-pane \; save-buffer /tmp/tmux-buffer \; delete-buffer \; display-popup -w 80% -h 60% -E "fzf-speed"

  bind x run-shell "                                          \
    if [ #{session_windows} -eq 1 ] &&                      \
        [ #{window_panes}    -eq 1 ] ; then                  \
        if [ \$(tmux list-sessions | wc -l) -ge 2 ]; then   \
            tmux switch-client -l;                          \
        fi; tmux kill-session -t \"#S\";                    \
    else                                                    \
        tmux kill-pane;                                     \
    fi;                                                     \
    "

# ==============================================================

# eliminate delays when switching modes in vim
  set -sg escape-time 0

# increase scrollback lines
  set -g history-limit 100000

# =======================================
# Sessions
# ======================================

# don't detach from tmux when closing a session (just open a different session)
  set -g detach-on-destroy off

# =======================================
# Copy paste stuff
# =================================================

# Allows scrolling and selecting in copy-mode
  set -g mouse on
  bind -n WheelUpPane   select-pane -t= \; copy-mode -e \; send-keys -M
  bind -n WheelDownPane select-pane -t= \;                 send-keys -M

  bind-key -T edit-mode-vi Up send-keys -X history-up
  bind-key -T edit-mode-vi Down send-keys -X history-down

  bind-key -T copy-mode-vi v send-keys -X begin-selection
# MacOS
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
# bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
# Linux
  bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace xsel"
  bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace xsel"

# =================================================
# Plugin Setup
# =================================================

# use duckduckgo for searching selected term (<prefix>shift-s)
  set -g @open-S 'https://www.duckduckgo.com/?q='

#==================================================
# Plugins
# =================================================

  set -g @plugin 'tmux-plugins/tpm'
  set -g @plugin 'tmux-plugins/tmux-sensible'
  set -g @plugin 'tmux-plugins/tmux-yank'
  set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
  set -g @plugin 'catppuccin/tmux'
  set -g @plugin 'christoomey/vim-tmux-navigator'
  set -g @plugin 'tmux-plugins/tmux-resurrect'
  set -g @plugin 'tmux-plugins/tmux-continuum'

  set -g @catppuccin_flavour 'frappe'

  set -g @catppuccin_window_left_separator "Óā∂"
  set -g @catppuccin_window_right_separator "Óāī "
  set -g @catppuccin_window_middle_separator " ‚Ėą"
  set -g @catppuccin_window_number_position "right"

  set -g @catppuccin_window_default_fill "number"
  set -g @catppuccin_window_default_text "#W"

  set -g @catppuccin_window_current_fill "number"
  set -g @catppuccin_window_current_text "#W"

  # set -g @catppuccin_status_modules_right "directory session"
  set -g @catppuccin_status_left_separator  " Óā∂"
  set -g @catppuccin_status_right_separator "Óāī"
  set -g @catppuccin_status_fill "icon"
  set -g @catppuccin_status_connect_separator "no"

  set -g @catppuccin_directory_text "#{pane_current_path}"

# =================================================

# install tpm if not already installed
  if "test ! -d ~/.tmux/plugins/tpm" \
    "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
  run -b '~/.tmux/plugins/tpm/tpm || true'
