theme = "catppuccin_mocha_blur"  # fallback to "catppuccin_mocha" if blur variant not installed[](https://github.com/catppuccin/helix)

[editor]
true-color = true
auto-save = true                # auto-save on focus lost / buffer change – great for dev
auto-format = true              # format on :w using LSP formatter when available
bufferline = "multiple"
mouse = true
line-number = "relative"
cursorline = true
color-modes = true              # nice visual feedback for modes
idle-timeout = 200              # good balance for LSP hover / diagnostics
scroll-lines = 3                # smooth scrolling feel
text-width = 100                # modern screen friendly
gutters = ["diff", "diagnostics", "line-numbers", "spacer"]
end-of-line-diagnostics = "hint"  # less intrusive than error/warning

[editor.inline-diagnostics]
cursor-line = "error"           # only show errors on the line with cursor
other-lines = "disable"         # keep editor clean

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = ["mode", "spinner", "version-control", "file-name"]
center = ["file-base-name", "read-only-indicator", "file-modification-indicator"]
right = ["diagnostics", "selections", "primary-selection-length", "position", "total-line-numbers", "file-encoding", "file-type"]
separator = "│"                 # clean vertical bar

[editor.lsp]
enable = true
auto-signature-help = false     # avoid popup spam; trigger manually when needed
display-messages = true         # show LSP messages in statusline
display-inlay-hints = true      # fantastic for Rust / TS / etc. (types, params)
snippets = true
goto-reference-include-declaration = false

[editor.completion]
auto-completion = true
completion-trigger-len = 1      # trigger early for better UX
completion-replace = true       # replace word on selection
completion-timeout = 15

[editor.soft-wrap]
enable = true
max-wrap = 25                   # effectively wraps around ~100-120 columns
max-indent-retain = 0
wrap-indicator = "↪ "           # nice visual cue

[editor.indent-guides]
render = true
character = "╎"                 # subtle vertical line
# rainbow = "dim"               # uncomment for subtle rainbow effect

[editor.file-picker]
hidden = false                  # show dotfiles by default
parents = true                  # respect parent .gitignore etc.
git-ignore = true
git-global = true
git-exclude = true

# ──────────────────────────────────────────────────────────────
# Keybindings – productivity focused for development
# ──────────────────────────────────────────────────────────────

[keys.normal]
"%"  = "match_brackets"
"$"  = "goto_line_end"
"0"  = "goto_line_start"
"G"  = "goto_file_end"

# Buffer navigation
"A-<" = "goto_previous_buffer"   # Alt + <
"A->" = "goto_next_buffer"       # Alt + >
"A-w" = ":buffer-close"          # Alt + w close buffer

# Improved * / # word under cursor search (Vim style)
"*" = "search_selection"
"#" = ["search_selection", "search_prev"]

# Lazygit (very useful!)
"C-g" = [
  ":new",
  ":insert-output lazygit",
  ":buffer-close!",
  ":redraw",
  ":reload-all"
]

# Yazi file picker (community favorite; slight cleanup)
"C-y" = [
  ":sh rm -f /tmp/helix-yazi-chooser",
  ":insert-output yazi %{buffer_name} --chooser-file=/tmp/helix-yazi-chooser",
  # Optional restore terminal – comment out if issues in your terminal
  # ":sh printf '\\x1b[?1049h\\x1b[?2004h' > /dev/tty",
  ":open %sh{cat /tmp/helix-yazi-chooser}",
  ":redraw",
  ":set mouse false",   # sometimes needed after external program
  ":set mouse true"
]

# Extra dev helpers
"A-f" = ":format"                         # manual LSP format
"C-o" = "jump_backward"
"C-i" = "jump_forward"

# Space as pseudo-leader (most common community pattern)
[keys.normal.space]
l = ":toggle lsp.display-inlay-hints"     # toggle inlay hints
w = ":write"                              # <Space>w → save
q = ":quit"                               # <Space>q → quit
# x = "extend_to_line_bounds"             # optional <Space>x
# Add more as needed, e.g. f = ":format"

[keys.select]
i = "select_textobject_inner"
a = "select_textobject_around"
"A-x" = "extend_to_line_bounds"
"X" = "select_line_above"

[keys.insert]
# jj to exit insert (correct Helix syntax – allows typing real "jj" too)
j = { j = "normal_mode" }
# Alternative: uncomment for jk instead
# k = { j = "normal_mode" }  # or swap to whatever you prefer
