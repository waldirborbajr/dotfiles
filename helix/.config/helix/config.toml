# ====================== THEME ======================
theme = "nord"

# ====================== EDITOR ======================
[editor]
true-color = true
# transparent = true # ← enable if WezTerm background opacity is active
auto-format = true
bufferline = "multiple"
mouse = true
line-number = "relative"
cursorline = true
color-modes = true
idle-timeout = 50
scroll-lines = 3
scrolloff = 8
text-width = 100
gutters = ["diff", "diagnostics", "line-numbers", "spacer"]
end-of-line-diagnostics = "hint"
trim-trailing-whitespace = true
trim-final-newlines = true
continue-comments = false
completion-trigger-len = 1
completion-replace = true

[editor.auto-save]
focus-lost = true

[editor.auto-save.after-delay]
enable = true
timeout = 1500

[editor.inline-diagnostics]
cursor-line = "error"
other-lines = "warning"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = ["mode", "spinner", "version-control", "file-name"]
center = ["file-base-name", "read-only-indicator", "file-modification-indicator"]
right = ["diagnostics", "selections", "primary-selection-length", "position-percentage", "position", "total-line-numbers", "file-encoding", "file-type"]
separator = "│"

[editor.lsp]
enable = true
display-messages = true
display-inlay-hints = true
snippets = true
auto-signature-help = true
goto-reference-include-declaration = true

[editor.soft-wrap]
enable = true
max-wrap = 25
max-indent-retain = 0
wrap-indicator = "↪ "

[editor.indent-guides]
render = true
character = "▏"

[editor.file-picker]
hidden = true
parents = true
git-ignore = true
git-global = true
git-exclude = true

# ====================== KEYBINDINGS ======================
[keys.normal.g.e]
c = ":config-open"
t = ":open ~/.tmux.conf"
a = ":open ~/.alias"
z = ":open ~/.zshrc"
l = ":open ~/.config/helix/languages.toml"

[keys.normal]
"A-<" = "goto_previous_buffer"
"A->" = "goto_next_buffer"
"A-w" = ":buffer-close"

"*" = "search_selection"
"#" = ["search_selection", "search_prev"]

"U" = "redo"

"C-g" = [
  ":new",
  ":insert-output lazygit",
  ":buffer-close!",
  ":redraw",
  ":reload-all"
]

"C-y" = [
  ":sh rm -f /tmp/helix-yazi-chooser",
  ":insert-output yazi %{buffer_name} --chooser-file=/tmp/helix-yazi-chooser",
  ":open %sh{cat /tmp/helix-yazi-chooser}",
  ":redraw"
]

"A-f" = ":format"
"C-o" = "jump_backward"
"C-i" = "jump_forward"
"C-n" = "goto_next_diag"
"C-p" = "goto_prev_diag"

[keys.normal.g]
d = "goto_definition"
r = "goto_reference"
i = "goto_implementation"
y = "goto_type_definition"

[keys.normal.space]
l = ":toggle lsp.display-inlay-hints"
w = ":write"
q = ":quit"
Q = ":qa!"
r = "rename_symbol"
Y = ":sh echo -n %{buffer_name} | pbcopy"
M = ":set-language markdown"
f = "file_picker_in_current_buffer_directory"
s = "symbol_picker"
S = "workspace_symbol_picker"
e = "select_textobject_around"

# Multi-cursor
"C-c" = "toggle_comments"
"C-a" = "select_all"

[keys.select]
i = "select_textobject_inner"
a = "select_textobject_around"
"A-x" = "extend_to_line_bounds"
"X" = "select_line_above"

[keys.insert]
j = { j = "normal_mode" }
"C-s" = ":w"
