# ====================== THEME ======================
theme = "nord"

# ====================== EDITOR ======================
[editor]
true-color = true
auto-format = true
bufferline = "multiple"
mouse = true
line-number = "relative"
cursorline = true
color-modes = true
idle-timeout = 250
scroll-lines = 3
scrolloff = 8
text-width = 100
gutters = ["diff", "diagnostics", "line-numbers", "spacer"]
end-of-line-diagnostics = "hint"
trim-trailing-whitespace = true
trim-final-newlines = true

# Auto-save inteligente
[editor.auto-save]
focus-lost = true
[editor.auto-save.after-delay]
enable = true
timeout = 1500

[editor.inline-diagnostics]
cursor-line = "error"
other-lines = "disable"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

# Statusline aprimorada
[editor.statusline]
left = ["mode", "spinner", "version-control", "file-name"]
center = ["file-base-name", "read-only-indicator", "file-modification-indicator"]
right = ["diagnostics", "selections", "primary-selection-length", "position", "total-line-numbers", "file-encoding", "file-type"]
separator = "│"

[editor.lsp]
enable = true
display-messages = true
display-inlay-hints = true
snippets = true
auto-signature-help = false

[editor.soft-wrap]
enable = true
max-wrap = 25
max-indent-retain = 0
wrap-indicator = "↪ "

[editor.indent-guides]
render = true
character = "▏"          # mudei para este (fica mais limpo)

[editor.file-picker]
hidden = false
parents = true
git-ignore = true
git-global = true
git-exclude = true

# ====================== KEYBINDINGS ======================
[keys.normal]
# Navegação de buffers
"A-<" = "goto_previous_buffer"
"A->" = "goto_next_buffer"
"A-w" = ":buffer-close"

# Busca
"*" = "search_selection"
"#" = ["search_selection", "search_prev"]

# Ferramentas externas
"C-g" = [
  ":new",
  ":insert-output lazygit",
  ":buffer-close!",
  ":redraw",
  ":reload-all"
]

"C-y" = [
  ":sh rm -f /tmp/helix-yazi-chooser",
  ":insert-output yazi %{buffer_name} --chooser-file=/tmp/helix-yazi-chooser",
  ":open %sh{cat /tmp/helix-yazi-chooser}",
  ":redraw"
]

"A-f" = ":format"
"C-o" = "jump_backward"
"C-i" = "jump_forward"

[keys.normal.space]
l = ":toggle lsp.display-inlay-hints"
w = ":write"
q = ":quit"
Y = ":sh echo -n %{buffer_name} | pbcopy"
M = ":set-language markdown"

[keys.select]
i = "select_textobject_inner"
a = "select_textobject_around"
"A-x" = "extend_to_line_bounds"
"X" = "select_line_above"

[keys.insert]
j = { j = "normal_mode" }
"C-s" = ":w"          # salvar com Ctrl+S
