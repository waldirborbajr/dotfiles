# ====================== THEME ======================
theme = "nord"

# ====================== EDITOR ======================
[editor]
true-color = true
auto-format = true
bufferline = "multiple"
mouse = true
line-number = "relative"
cursorline = true
color-modes = true
idle-timeout = 50
scroll-lines = 3
scrolloff = 8
text-width = 100
gutters = ["diff", "diagnostics", "line-numbers", "spacer"]
end-of-line-diagnostics = "hint"
trim-trailing-whitespace = true
trim-final-newlines = true
continue-comments = false
completion-trigger-len = 1
completion-replace = true

[editor.auto-save]
focus-lost = true

[editor.auto-save.after-delay]
enable = true
timeout = 1500

[editor.inline-diagnostics]
cursor-line = "error"
other-lines = "warning"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = ["mode", "spinner", "version-control", "file-name"]
center = ["file-base-name", "read-only-indicator", "file-modification-indicator"]
right = ["diagnostics", "selections", "primary-selection-length", "position-percentage", "position", "total-line-numbers", "file-encoding", "file-type"]
separator = "│"

[editor.lsp]
enable = true
display-messages = true
display-inlay-hints = true
snippets = true
auto-signature-help = true
goto-reference-include-declaration = true

[editor.soft-wrap]
enable = true
max-wrap = 25
max-indent-retain = 0
wrap-indicator = "↪ "

[editor.indent-guides]
render = true
character = "▏"

[editor.file-picker]
hidden = true
parents = true
git-ignore = true
git-global = true
git-exclude = true

# ====================== KEYBINDINGS ======================

[keys.normal]
"U" = "redo"

"C-g" = [
  ":new",
  ":insert-output lazygit",
  ":buffer-close!",
  ":redraw",
  ":reload-all"
]

"C-y" = [
  ":sh rm -f /tmp/helix-yazi-chooser",
  ":insert-output yazi %{buffer_name} --chooser-file=/tmp/helix-yazi-chooser",
  ":open %sh{cat /tmp/helix-yazi-chooser}",
  ":redraw"
]
