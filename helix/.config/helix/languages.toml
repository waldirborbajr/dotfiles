####################################################################################################
# Helix Languages Configuration - Versão Otimizada 2026
####################################################################################################

# ================================== Go ==================================
[language-server.gopls]
command = "gopls"

[language-server.gopls.config]
gofumpt = true
staticcheck = true
semanticTokens = true
usePlaceholders = true
completeUnimported = true
vulncheck = "Imports"

[language-server.gopls.config.hints]
compositeLiteralFields = true
parameterNames = true
rangeVariableTypes = true

[language-server.golangci-lint-lsp]
command = "golangci-lint-langserver"

[[language]]
name = "go"
file-types = ["go"]
roots = ["go.work", "go.mod"]
auto-format = true
formatter = { command = "goimports" }
language-servers = ["gopls", "golangci-lint-lsp"]
indent = { tab-width = 4, unit = "\t" }

# ================================== Rust ==================================
[language-server.rust-analyzer]
command = "rust-analyzer"

[language-server.rust-analyzer.config]
check.command = "clippy"
checkOnSave = true
cargo.loadOutDirsFromCheck = true
procMacro.enable = true

[language-server.rust-analyzer.config.inlayHints]
bindingModeHints.enable = true
closureReturnTypeHints.enable = "with_block"
discriminantHints.enable = "fieldless"
lifetimeElisionHints.enable = "skip_trivial"
typeHints.hideClosureInitialization = false

[[language]]
name = "rust"
file-types = ["rs"]
roots = ["Cargo.toml"]
auto-format = true
language-servers = ["rust-analyzer"]
indent = { tab-width = 4, unit = "\t" }

# ================================== Lua (Importante para WezTerm) ==================================
[language-server.lua-language-server]
command = "lua-language-server"

[[language]]
name = "lua"
file-types = ["lua"]
roots = ["init.lua", ".luarc.json"]
auto-format = true
formatter = { command = "stylua" }
language-servers = ["lua-language-server"]
indent = { tab-width = 2, unit = "  " }

# ================================== TypeScript / JavaScript ==================================
[language-server.typescript-language-server]
command = "typescript-language-server"
args = ["--stdio"]

[[language]]
name = "typescript"
file-types = ["ts", "tsx"]
roots = ["package.json", "tsconfig.json"]
auto-format = true
formatter = { command = "prettier", args = ["--parser", "typescript"] }
language-servers = ["typescript-language-server"]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "javascript"
file-types = ["js", "jsx"]
roots = ["package.json"]
auto-format = true
formatter = { command = "prettier", args = ["--parser", "babel"] }
language-servers = ["typescript-language-server"]
indent = { tab-width = 2, unit = "  " }

# ================================== Python ==================================
[language-server.pylsp]
command = "pylsp"

[[language]]
name = "python"
file-types = ["py", "pyi"]
roots = ["pyproject.toml", "setup.py", "requirements.txt"]
auto-format = true
formatter = { command = "black" }
language-servers = ["pylsp"]
indent = { tab-width = 4, unit = "    " }

# ================================== Nix ==================================
[language-server.nixd]
command = "nixd"

[[language]]
name = "nix"
file-types = ["nix"]
roots = ["flake.nix", "shell.nix"]
auto-format = true
formatter = { command = "alejandra" }
language-servers = ["nixd"]
indent = { tab-width = 2, unit = "  " }

# ================================== Markdown ==================================
[language-server.marksman]
command = "marksman"
args = ["server"]

[[language]]
name = "markdown"
file-types = ["md", "markdown"]
auto-format = false
language-servers = ["marksman"]
indent = { tab-width = 2, unit = "  " }

# ================================== Outros formatos úteis ==================================
[[language]]
name = "yaml"
file-types = ["yml", "yaml"]
auto-format = true
formatter = { command = "prettier", args = ["--parser", "yaml"] }
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "json"
file-types = ["json"]
auto-format = true
formatter = { command = "prettier", args = ["--parser", "json"] }
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "toml"
file-types = ["toml"]
auto-format = true
formatter = { command = "taplo", args = ["fmt", "-"] }
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "dockerfile"
file-types = ["Dockerfile", "dockerfile"]
auto-format = false
language-servers = ["docker-langserver"]
indent = { tab-width = 4, unit = "\t" }

[[language]]
name = "bash"
file-types = ["sh", "bash", "zsh"]
auto-format = false
language-servers = ["bash-language-server"]
indent = { tab-width = 4, unit = "\t" }
