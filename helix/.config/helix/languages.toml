####################################################################################################
# Helix languages.toml - Unified Balanced Config (2026)
####################################################################################################

# ================================================================================================
# GO
# ================================================================================================

[language-server.gopls]
command = "gopls"

[language-server.gopls.config]
gofumpt = true
staticcheck = true
semanticTokens = true
usePlaceholders = true
completeUnimported = true
vulncheck = "Imports"

[language-server.gopls.config.hints]
compositeLiteralFields = true
parameterNames = true
rangeVariableTypes = true

[language-server.golangci-lint-lsp]
command = "golangci-lint-langserver"

[[language]]
name = "go"
scope = "source.go"
injection-regex = "go"
file-types = ["go"]
roots = ["go.work", "go.mod"]
auto-format = true
formatter = { command = "goimports", args = ["-"] }  # -" reads from stdin
language-servers = ["gopls", "golangci-lint-lsp"]
comment-token = "//"
block-comment-tokens = { start = "/*", end = "*/" }
indent = { tab-width = 4, unit = "\t" }

# ================================================================================================
# RUST
# ================================================================================================

[language-server.rust-analyzer]
command = "rust-analyzer"

[language-server.rust-analyzer.config]
checkOnSave = true
check = { command = "clippy" }
cargo.loadOutDirsFromCheck = true
cargo.allFeatures = true
procMacro.enable = true
procMacro.attributes.enable = true
files.excludeDirs = [".git", "target", "node_modules"]

[language-server.rust-analyzer.config.inlayHints]
enable = true
parameterHints.enable = true
bindingModeHints.enable = true
typeHints.enable = true
typeHints.hideClosureInitialization = false
chainingHints.enable = true
closureReturnTypeHints.enable = "with_block"
lifetimeElisionHints.enable = "skip_trivial"
discriminantHints.enable = "fieldless"

[language-server.rust-analyzer.config.diagnostics]
enable = true

[[language]]
name = "rust"
scope = "source.rust"
injection-regex = "rs|rust"
file-types = ["rs"]
roots = ["Cargo.toml"]
auto-format = true
formatter = { command = "rustfmt", args = ["--emit=stdout"] }
language-servers = ["rust-analyzer"]
indent = { tab-width = 4, unit = "\t" }
comment-tokens = ["//", "///", "//!"]
block-comment-tokens = [
  { start = "/*", end = "*/" },
  { start = "/**", end = "*/" }
]
persistent-diagnostic-sources = ["rustc", "clippy"]

# ================================================================================================
# LUA
# ================================================================================================

[language-server.lua-language-server]
command = "lua-language-server"

[[language]]
name = "lua"
scope = "source.lua"
injection-regex = "lua"
file-types = ["lua"]
roots = ["init.lua", ".luarc.json", ".stylua.toml"]
auto-format = true
# --stdin-filepath tells stylua which filetype it's reading from stdin
formatter = { command = "stylua", args = ["--stdin-filepath", "x.lua", "-"] }
language-servers = ["lua-language-server"]
indent = { tab-width = 2, unit = "  " }
comment-token = "--"

# ================================================================================================
# TYPESCRIPT / JAVASCRIPT
# ================================================================================================

[language-server.typescript-language-server]
command = "typescript-language-server"
args = ["--stdio"]

[[language]]
name = "typescript"
scope = "source.ts"
injection-regex = "ts|typescript"
file-types = ["ts", "tsx"]
roots = ["package.json", "tsconfig.json"]
auto-format = true
formatter = { command = "prettier", args = ["--parser", "typescript"] }
language-servers = ["typescript-language-server"]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "javascript"
scope = "source.js"
injection-regex = "js|javascript"
file-types = ["js", "jsx", "mjs", "cjs"]
roots = ["package.json"]
auto-format = true
formatter = { command = "prettier", args = ["--parser", "babel"] }
language-servers = ["typescript-language-server"]
indent = { tab-width = 2, unit = "  " }

# ================================================================================================
# PYTHON
# ================================================================================================

[language-server.pylsp]
command = "pylsp"

[[language]]
name = "python"
scope = "source.python"
injection-regex = "py|python"
file-types = ["py", "pyi"]
roots = ["pyproject.toml", "setup.py", "requirements.txt"]
auto-format = true
formatter = { command = "black", args = ["-"] }
language-servers = ["pylsp"]
indent = { tab-width = 4, unit = "    " }
comment-token = "#"

# ================================================================================================
# TOML
# ================================================================================================

[language-server.taplo]
command = "taplo"
args = ["lsp", "stdio"]

[[language]]
name = "toml"
scope = "source.toml"
injection-regex = "toml"
file-types = ["toml", "Cargo.lock"]
roots = []
auto-format = true
formatter = { command = "taplo", args = ["fmt", "-"] }
language-servers = ["taplo"]
indent = { tab-width = 2, unit = "  " }
comment-token = "#"

# ================================================================================================
# JSON / JSONC
# ================================================================================================

[language-server.vscode-json-language-server]
command = "vscode-json-language-server"  # installed via: npm i -g vscode-langservers-extracted
args = ["--stdio"]

[[language]]
name = "json"
scope = "source.json"
injection-regex = "json"
file-types = ["json"]
roots = []
auto-format = true
formatter = { command = "prettier", args = ["--parser", "json"] }
language-servers = ["vscode-json-language-server"]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "jsonc"
scope = "source.json"
injection-regex = "jsonc"
file-types = ["jsonc"]
roots = []
auto-format = true
# jsonc has comments so use json parser (prettier strips them on format — acceptable)
formatter = { command = "prettier", args = ["--parser", "json"] }
language-servers = ["vscode-json-language-server"]
indent = { tab-width = 2, unit = "  " }

# ================================================================================================
# YAML
# ================================================================================================

[language-server.yaml-language-server]
command = "yaml-language-server"  # installed via: npm i -g yaml-language-server
args = ["--stdio"]

[[language]]
name = "yaml"
scope = "source.yaml"
injection-regex = "yml|yaml"
file-types = ["yml", "yaml"]
roots = []
auto-format = true
formatter = { command = "prettier", args = ["--parser", "yaml"] }
language-servers = ["yaml-language-server"]  # hover, validation, schema support
indent = { tab-width = 2, unit = "  " }
comment-token = "#"

# ================================================================================================
# XML
# ================================================================================================

[language-server.lemminx]
command = "lemminx"

[[language]]
name = "xml"
scope = "source.xml"
injection-regex = "xml"
file-types = ["xml", "svg", "xsd", "xsl"]
roots = []
auto-format = false
language-servers = ["lemminx"]
indent = { tab-width = 2, unit = "  " }
comment-token = "<!--"

# ================================================================================================
# NIX
# ================================================================================================

[language-server.nixd]
command = "nixd"

[[language]]
name = "nix"
scope = "source.nix"
injection-regex = "nix"
file-types = ["nix"]
roots = ["flake.nix", "shell.nix", "default.nix"]
auto-format = true
formatter = { command = "alejandra" }
language-servers = ["nixd"]
indent = { tab-width = 2, unit = "  " }
comment-token = "#"

# ================================================================================================
# DOCKERFILE
# ================================================================================================

[language-server.docker-langserver]
command = "docker-langserver"
args = ["--stdio"]

[[language]]
name = "dockerfile"
scope = "source.dockerfile"
injection-regex = "docker|dockerfile"
file-types = ["Dockerfile", "dockerfile"]
roots = ["Dockerfile", "docker-compose.yml", "compose.yaml"]
auto-format = false
language-servers = ["docker-langserver"]
indent = { tab-width = 4, unit = "\t" }
comment-token = "#"

# ================================================================================================
# MARKDOWN
# ================================================================================================

[language-server.marksman]
command = "marksman"
args = ["server"]

[[language]]
name = "markdown"
scope = "source.md"
injection-regex = "md|markdown"
file-types = ["md", "markdown", "mdx"]
auto-format = false
language-servers = ["marksman"]
indent = { tab-width = 2, unit = "  " }
comment-token = "<!--"

# ================================================================================================
# SHELL / BASH / ZSH
# ================================================================================================

[language-server.bash-language-server]
command = "bash-language-server"
args = ["start"]

[[language]]
name = "bash"
scope = "source.bash"
injection-regex = "bash|sh|z?sh"
file-types = [
  "sh", "bash", "zsh",
  ".bashrc", ".zshrc", ".profile", ".bash_profile"
]
auto-format = false
language-servers = ["bash-language-server"]
indent = { tab-width = 4, unit = "\t" }
comment-token = "#"
